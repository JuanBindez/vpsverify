version: '3.8'

services:
  flask1:
    build: .
    container_name: flask_app_1
    networks:
      - app_network
    restart: always

  flask2:
    build: .
    container_name: flask_app_2
    networks:
      - app_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask1
      - flask2
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge